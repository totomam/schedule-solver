name: Solver smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run solver smoke test (1 run)
        # Pinned seed → reproducible; the test now exits nonzero if the run fails the audit.
        run: TEST_SEED=42 TEST_RUNS=1 python test_protocol.py
